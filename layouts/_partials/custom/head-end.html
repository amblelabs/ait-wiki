<script>
    document.addEventListener("DOMContentLoaded", function () {
        // 1. Temporarily commented out tracking so it doesn't lock you out during testing
        // if (sessionStorage.getItem("popupDismissed")) { return; }

        // 2. Pure inline styles: This forces the browser to render the layout perfectly
        // the exact millisecond it hits the DOM, preventing any flashing.
        const popupHTML = `
    <div id="big-popup" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 99999999; box-sizing: border-box;">
        <div class="popup-content" style="background: #111111 !important; color: #1a1a1a !important; padding: 50px 40px; border-radius: 12px; position: relative; width: 90%; max-width: 600px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); text-align: center; box-sizing: border-box; font-family: sans-serif;">

            <button class="close-btn" id="close-popup" aria-label="Close popup" style="position: absolute; top: 10px; right: 20px; background: none; border: none; font-size: 38px; cursor: pointer; color: #666666 !important; line-height: 1;">&times;</button>

            <h2 style="font-size: 2rem; margin-top: 0; margin-bottom: 15px; font-weight: bold; color: #f1f5f9 !important;">📢 Wiki Has Moved!</h2>
            <p style="margin-bottom: 25px; line-height: 1.6; color: #f3f4f6 !important; font-size: 1.1rem;">
                This wiki is now <strong>deprecated</strong>. We have migrated all documentation to our brand new platform.
            </p>

            <a href="https://amblelabs.dev/wiki" class="popup-redirect-btn" style="display: inline-block; padding: 14px 28px; background-color: #ff8000 !important; color: #f3f4f6 !important; border-radius: 6px; font-weight: bold; text-decoration: none !important; font-size: 1rem; box-shadow: 0 4px 12px rgba(253, 133, 44, 0.3);">
                Go to the New Wiki
            </a>
        </div>
    </div>
    `;

        // 3. Inject explicitly at the absolute end of the body rendering path
        document.body.insertAdjacentHTML('beforeend', popupHTML);

        const popup = document.getElementById("big-popup");
        const closeBtn = document.getElementById("close-popup");

        // 4. Dismiss handling
        function dismissPopup() {
            popup.style.display = "none";
            sessionStorage.setItem("popupDismissed", "true");
        }

        closeBtn.addEventListener("click", dismissPopup);

        // Close if background overlay is clicked
        window.addEventListener("click", function (event) {
            if (event.target === popup) {
                dismissPopup();
            }
        });
    });
</script>

<script>
    (function() {
        // 1. YOUR MANUAL LINK MAP
        // "Old Page Path": "Full New URL Location"
        const redirectMap = {
            "/ait-wiki/advancements/": "https://amblelabs.dev/wiki/advancement/",
            // 💡 You can easily add more lines right here as you find them!
        };

        // 2. Get the current page path
        let currentPath = window.location.pathname;

        // Normalization: Ensure it ends with a trailing slash to match the map keys perfectly
        if (!currentPath.endsWith('/')) {
            currentPath += '/';
        }

        // 3. Routing Logic
        if (redirectMap[currentPath]) {
            // MATCH: Send them to the exact new page you defined above
            window.location.replace(redirectMap[currentPath]);
        } else {
            // NO MATCH / DELETED PAGE: Safely drop them on the new homepage
            window.location.replace("https://amblelabs.dev/wiki/");
        }
    })();
</script>
