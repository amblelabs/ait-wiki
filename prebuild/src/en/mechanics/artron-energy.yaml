  - _type: text
    alt: Content
    value: >-
      ## What Is It?


      **Artron Energy** is the fuel the TARDIS runs on. It is measured using
      *Artron Units*, or *AU,* It can be obtained through rifts in the
      Overworld, or passively in any dimension.


      ---


      ## Where Is It Collected From?


      **Artron Energy** is collected by the TARDIS during **refueling**, and can
      be passively gained from anywhere (slowly) or gained in larger amounts
      quicker in a **[rift chunk](../rift-chunks)**.


      It can also be collected by **Artron Collectors**, which come in block and
      item form.


      ## Artron Collector Block


      ![](/images/mechanics/artron/collector-recipe.png)


      To use it, place it in a rift chunk and it will slowly drain the chunk
      over time (filling up the collector block)


      ## Artron Collector Unit


      ![](/images/mechanics/artron/panel-recipe.png)


      Right-clicking on the Artron Collector with the Collector Unit will
      transfer the Artron inside it into the unit, which can then be used on a
      TARDIS' console to refuel the TARDIS.
